name: Publish FastAPI Extended Query Method Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10.13] # [3.10.13, 3.11.7, 3.12.3]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install setuptools
        run: pip install --upgrade setuptools

      - name: Install wheel
        run: pip install --upgrade wheel

      - name: Set package version from release tag
        run: echo "PACKAGE_VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

      - name: Build package
        run: python setup.py sdist bdist_wheel

      - name: show current directory
        run: pwd

      - name: List files in the working directory
        run: ls -al

      - name: List files in build directory
        run: ls -lR build

      - name: List files in dist directory
        run: ls -lR dist

      - name: Inspect wheel contents
        run: |
          python - << 'EOF'
          import glob
          import zipfile

          wheel = glob.glob("dist/*.whl")[0]
          print(f"Wheel: {wheel}\n")

          with zipfile.ZipFile(wheel) as z:
              for name in z.namelist():
                  print(name)
          EOF

      - name: Zip build and dist directories
        run: zip -r build_dist.zip build/ dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: build_dist.zip
          retention-days: 30

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package

      - name: show current directory
        run: pwd

      - name: List files in the working directory
        run: ls -al

      - name: Unzip package
        run: unzip build_dist.zip

      - name: List files after unzip artifact
        run: ls -al

      - name: List files in build directory
        run: ls -lR build

      - name: List files in dist directory
        run: ls -lR dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages_dir: ./dist
